<!doctype html>
<html lang="en" data-reload-on-lang>
<head>
<script src="./assets/js/theme.js"></script>
<script src="./assets/js/i18n.js"></script>
<meta charset="utf-8" />
<title>CernoFlow — Platform Diagram</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  :root {
    --bg-1: #0a0e14;
    --ink-0: #ffffff;
    --ink-1: #cbd5e1;
    --ink-2: #94a3b8;
    --ink-3: #64748b;
    --ink-4: #475569;
    --brand-blue: #5B8AEC;
    --brand-blue-soft: #7BA5FF;
    --ai-purple: #C484FF;
    --ai-purple-soft: #D9A8FF;
  }
  html, body, #root {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000;
    color: var(--ink-0);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .stage {
    position: relative;
    width: 100vw;
    height: calc(100vh - 64px);
    margin-top: 64px;
    background:
      radial-gradient(ellipse at 50% 55%, #0e1320 0%, #0a0e14 45%, #06080c 80%, #04060a 100%);
    overflow: hidden;
    isolation: isolate;
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.55) 100%);
    pointer-events: none; z-index: 50;
  }
  .grain {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: overlay;
    opacity: .35;
    pointer-events: none; z-index: 51;
  }

  .scene {
    position: absolute; inset: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    align-items: center; justify-items: center;
    padding: 28px 32px 32px;
    box-sizing: border-box;
    z-index: 10;
  }
  .heading-block {
    text-align: center;
    max-width: 1000px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 1400ms ease, transform 1400ms cubic-bezier(.2,.6,.2,1);
  }
  .heading-block.in { opacity: 1; transform: translateY(0); }

  .headline {
    font-family: "Inter", sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 2.6vw, 40px);
    letter-spacing: -0.022em;
    line-height: 1.05;
    white-space: nowrap;
    color: #ffffff;
    margin: 0;
    text-wrap: balance;
  }

  .subtitle {
    margin: 12px 0 28px;
    font-family: "Inter", sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(14px, 1.2vw, 18px);
    color: rgba(184, 196, 220, 0.85);
    line-height: 1.5;
    text-wrap: balance;
    max-width: 880px;
  }

  .diagram-wrap {
    position: relative;
    width: min(68vh, 72vw, 720px);
    aspect-ratio: 1;
    display: grid;
    place-items: center;
  }
  .diagram-wrap > svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }

  /* Wedge fills */
  .wedge {
    transform-box: fill-box;
    transform-origin: 500px 500px;
    opacity: 0;
    transform: scale(.85);
    transition:
      opacity 900ms ease,
      transform 900ms cubic-bezier(.25,.6,.2,1),
      fill 220ms ease,
      stroke 220ms ease;
    cursor: pointer;
  }
  .wedge.in { opacity: 1; transform: scale(1); }
  .wedge:hover,
  .wedge.flashed {
    fill: var(--hover-fill, rgba(109,155,255,0.22)) !important;
    filter: drop-shadow(0 0 18px var(--hover-glow, rgba(123,165,255,0.8)));
    stroke: var(--hover-glow, rgba(123,165,255,0.9));
    stroke-width: 2 !important;
    transition: fill 180ms ease, filter 180ms ease, stroke-width 180ms ease, stroke 180ms ease;
  }

  .wedge-divider {
    stroke: rgba(148, 163, 184, 0.10);
    stroke-width: 1;
    fill: none;
    opacity: 0;
    transition: opacity 700ms ease 200ms;
  }
  .wedge-divider.in { opacity: 1; }

  .ring-edge {
    fill: none;
    stroke: rgba(148, 163, 184, 0.12);
    stroke-width: 1;
    opacity: 0;
    transition: opacity 700ms ease 300ms;
  }
  .ring-edge.in { opacity: 1; }

  /* Compliance band — two pink edges + faint fill, animates as ring-fence sweep at end */
  .compliance-band-edge {
    opacity: 1;
    stroke-dasharray: 3300;
    stroke-dashoffset: 3300;
    transition: stroke-dashoffset 1800ms ease-in-out, stroke 200ms ease, stroke-width 200ms ease, filter 200ms ease;
  }
  .compliance-band-edge.in {
    stroke-dashoffset: 0;
  }
  .compliance-band-edge.hovered {
    stroke: rgba(243,178,255,0.95);
    stroke-width: 2;
    filter: drop-shadow(0 0 10px rgba(232,121,249,0.7));
  }
  .compliance-band-fill {
    opacity: 0;
    transition: opacity 1000ms ease 1500ms, fill 200ms ease;
  }
  .compliance-band-fill.in { opacity: 1; }
  .compliance-band-fill.hovered {
    fill: rgba(232,121,249,0.16);
  }

  .compliance-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    font-weight: 500;
    fill: rgba(232, 121, 249, 1.0);
    letter-spacing: 0.24em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 800ms ease 1800ms;
  }
  .compliance-label.in { opacity: 1; }

  /* Wedge labels (curved) */
  .wedge-label {
    font-family: "Inter", sans-serif;
    font-weight: 600;
    font-size: 19px;
    letter-spacing: -0.005em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 700ms ease, fill 220ms ease;
  }
  .wedge-label-inner { fill: #E0EAFF; }   /* faint blue tint — entity model family */
  .wedge-label-outer { fill: #ffffff; }   /* pure white — solution-level */
  .wedge-label.in { opacity: 1; }
  .wedge-label.dim { opacity: 0.45; }

  .wedge-label-outer-size { font-size: 21px; }
  .wedge-label-inner-size { font-size: 21px; }

  /* Centre disc */
  .center-disc {
    transform-box: fill-box;
    transform-origin: 500px 500px;
    opacity: 0;
    transform: scale(.6);
    transition: opacity 900ms ease, transform 1100ms cubic-bezier(.2,.6,.2,1);
  }
  .center-disc.in { opacity: 1; transform: scale(1); }

  .center-pulse {
    transform-origin: 500px 500px;
    transform-box: fill-box;
    animation: centerPulse 5s ease-in-out infinite;
    opacity: 0;
    transition: opacity 1200ms ease 600ms;
  }
  .center-pulse.in { opacity: 1; }
  @keyframes centerPulse {
    0%, 100% { transform: scale(1);   opacity: .35; }
    50%      { transform: scale(1.06); opacity: .10; }
  }

  /* Centre overlay text */
  .center-text {
    position: absolute;
    left: 50%; top: 50%;
    /* Default (perched) transform: positioned just left of the centred convo floater,
       and nudged up so the face's vertical centre aligns with the "I've got this!" line.
       When .center-text gets .centred, it slides to the SVG centre. */
    transform: translate(calc(-50% - 220px), calc(-50% - 14px));
    text-align: center;
    width: 56px;
    opacity: 0;
    transition:
      opacity 600ms ease,
      transform 1400ms cubic-bezier(.55, .05, .25, 1);
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 66;  /* above the convo floater so the face is never occluded */
  }
  .center-text.in { opacity: 1; }
  .center-text.centred {
    transform: translate(-50%, -50%);
  }

  /* ===== Pixie dust — three beats:
     1. Sparkle phase (~1500ms) — a cluster of bright sparkles twinkle in
                                   sequence at the face spot. "Something's brewing."
     2. Smoke phase   (~1000ms) — soft cloud gathers, overlapping the sparkle tail.
     3. Reveal phase  (face fade-in) — face emerges from cloud, last wisps drift up. ===== */
  .pixie-dust {
    position: absolute;
    left: 50%; top: 50%;
    /* Same anchor as the perched .center-text — centred on the face spot */
    transform: translate(calc(-50% - 220px), calc(-50% - 14px));
    width: 60px;
    height: 60px;
    pointer-events: none;
    opacity: 0;
    z-index: 67;  /* above the face so dust briefly reads in front of it */
  }
  .pixie-dust.active { opacity: 1; }

  /* ---- Phase 1 sparkles — clean 4-point stars, bright, attention-grabbing ---- */
  .spark {
    position: absolute;
    left: 50%; top: 50%;
    opacity: 0;
    will-change: transform, opacity;
  }
  .spark .star {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(ellipse 50% 7% at 50% 50%, var(--spark-colour, #D9A8FF) 0%, transparent 70%),
      radial-gradient(ellipse 7% 50% at 50% 50%, var(--spark-colour, #D9A8FF) 0%, transparent 70%);
    filter:
      drop-shadow(0 0 4px var(--spark-colour, #D9A8FF))
      drop-shadow(0 0 8px rgba(217,168,255,0.6));
  }
  @keyframes sparkTwinkle {
    0%   { opacity: 0; transform: translate(var(--spark-x, 0), var(--spark-y, 0)) scale(0.3) rotate(0deg); }
    35%  { opacity: 1; transform: translate(var(--spark-x, 0), var(--spark-y, 0)) scale(1.0) rotate(20deg); }
    65%  { opacity: 1; transform: translate(var(--spark-x, 0), var(--spark-y, 0)) scale(1.15) rotate(40deg); }
    100% { opacity: 0; transform: translate(var(--spark-x, 0), var(--spark-y, 0)) scale(0.5) rotate(60deg); }
  }
  .pixie-dust.active .spark {
    animation: sparkTwinkle var(--spark-dur, 600ms) ease-in-out var(--spark-delay, 0ms) forwards;
  }

  /* ---- Phase 2 smoke wisps — soft blurred dots, gather inward then drift up ---- */
  .wisp {
    position: absolute;
    left: 50%; top: 50%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--wisp-colour, rgba(217,168,255,0.95)) 0%, transparent 65%);
    filter: blur(0.6px);
    opacity: 0;
    will-change: transform, opacity;
  }
  @keyframes wispDrift {
    0%   { opacity: 0;    transform: var(--wisp-from); }
    25%  { opacity: 0.95; transform: var(--wisp-mid); }
    65%  { opacity: 0.85; transform: var(--wisp-mid); }
    100% { opacity: 0;    transform: var(--wisp-to); }
  }
  .pixie-dust.active .wisp {
    animation: wispDrift var(--wisp-dur, 1500ms) ease-out var(--wisp-delay, 0ms) forwards;
  }

  /* Co-designer face inside centre */
  .codesigner-face {
    width: 56px !important;
    height: 32px !important;
    margin: 0 auto 14px !important;
    display: block !important;
  }
  .face-eye {
    fill: var(--ai-purple);
    transform-origin: center;
    transform-box: fill-box;
    animation: blink 8s ease-in-out infinite;
  }
  /* Both eyes blink together every 8s, blink action ~400ms */
  @keyframes blink {
    0%, 95%, 100% { transform: scaleY(1); }
    97%, 98%      { transform: scaleY(0.08); }
  }
  /* Single wink fires when .winking class is applied to right eye */
  .face-eye.winking {
    animation: blink 8s ease-in-out infinite, singleWink 380ms ease-in-out;
  }
  @keyframes singleWink {
    0%   { transform: scaleY(1); }
    25%  { transform: scaleY(0.08); }
    65%  { transform: scaleY(0.08); }
    100% { transform: scaleY(1); }
  }

  .face-mouth {
    fill: none;
    stroke: var(--ai-purple);
    stroke-width: 1.6;
    stroke-linecap: round;
  }
  .face-glow {
    fill: var(--ai-purple);
    opacity: 0.18;
    filter: blur(6px);
  }

  /* Side columns — pinned left and right of the ring.
     Both have the same anatomy: eyebrow + rule + body paragraph. */
  .side-column {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    max-width: 28vw;
    z-index: 60;
    pointer-events: none;
    font-family: "JetBrains Mono", monospace;
    opacity: 0;
    transition: opacity 280ms ease;
  }
  .side-column.left  { left: 4vw; }
  .side-column.right { right: 4vw; text-align: right; }
  .side-column.ready { opacity: 1; }

  .side-eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--brand-blue-soft);
    margin-bottom: 12px;
    min-height: 14px;
    transition: opacity 220ms ease, color 220ms ease;
  }
  .side-eyebrow.muted { color: var(--ink-3); }

  .side-rule {
    width: 32px;
    height: 1px;
    background: rgba(184,196,220,.35);
    margin-bottom: 14px;
    transition: opacity 220ms ease;
  }
  .side-column.right .side-rule { margin-left: auto; }

  .side-body {
    font-family: "Inter", sans-serif;
    font-size: 13.5px;
    font-weight: 400;
    color: var(--ink-1);
    line-height: 1.55;
    letter-spacing: -0.005em;
    min-height: 120px;
    transition: opacity 220ms ease, color 220ms ease;
  }
  .side-body.muted { color: var(--ink-2); font-style: italic; }

  /* === Floating conversation wrapper ===
     Centred while the user types, then slides right into the right-column body slot
     once `convoSettled` is true. Lives outside the side-column shell so it can move
     freely. The right-column shell renders the eyebrow + rule + an empty body slot
     above this same screen position.

     Anchored at the right-column position (right: 4vw, width: 260px). The 'centred'
     state uses a transform to push it to screen centre and scale it up; transitioning
     `transform` between states keeps the motion smooth. */
  .convo-floater {
    position: absolute;
    top: 50%;
    right: 4vw;
    width: 280px;
    z-index: 65;
    pointer-events: none;
    opacity: 0;
    transform-origin: 50% 50%;
    transition:
      transform 1400ms cubic-bezier(.55, .05, .25, 1),
      opacity 600ms ease;
  }
  .convo-floater.ready { opacity: 1; }
  /* Centred: shift left to screen centre, scale up. The translation =
       (50vw) - (right_edge - half_width) = 50vw - (100vw - 4vw - 140px) = -46vw + 140px */
  .convo-floater.centred {
    transform: translate(calc(-46vw + 140px), -50%) scale(1.3);
  }
  /* Settled: anchor the floater's TOP just below where the right column's eyebrow + rule
     end. The right column has top:50%;translateY(-50%); its body slot starts ~41px below
     its top. With a column min-height around 160px, the body's top sits roughly 39px above
     viewport centre. We use translateY(-39px) + scale(1) so the conversation begins right
     at the body slot's top, leaving the eyebrow + rule visible above it. */
  .convo-floater.settled {
    transform: translate(0, -39px) scale(1);
  }

  .timecode {
    position: absolute;
    left: 22px; bottom: 22px;
    z-index: 60;
    color: #334155;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: .08em;
  }

  /* Replay */
  .replay {
    position: absolute;
    right: 22px; bottom: 22px;
    z-index: 60;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.10);
    color: var(--ink-2);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: .04em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 600ms ease;
  }
  .replay.show { opacity: 1; }
  .replay:hover { color: #fff; border-color: rgba(255,255,255,.25); }

  /* === Co-designer conversation — lives in the right side column === */
  .convo-inline {
    width: 100%;
    padding: 0;
    margin: 0;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    line-height: 1.65;
    text-align: left;          /* override the right-column right-alignment */
  }
  .convo-line {
    margin-bottom: 10px;
  }
  .convo-line:last-child { margin-bottom: 0; }
  /* Both message lines flush — colour alone distinguishes speakers */
  .user-line { text-align: left; }
  .user-line .typed-text { color: #ffffff; font-weight: 500; }
  .ai-line   { text-align: left; }
  .ai-line .typed-text { color: var(--ai-purple-soft); display: block; }
  .ai-line .ai-opener-line { margin-bottom: 2px; }
  .ai-line .ai-followup-line { margin-top: 0; }

  /* The convo lives inside .side-body which has min-height + muted/inert styles —
     reset what we need */
  .convo-host { min-height: 120px; font-style: normal; color: var(--ink-1); }

  /* Typing cursor */
  .typed-text::after {
    content: "▌";
    margin-left: 1px;
    animation: cursorBlink 1.05s steps(2, start) infinite;
  }
  .user-line .typed-text::after { color: #ffffff; }
  .ai-line   .typed-text::after { color: var(--ai-purple-soft); }
  .typed-text.done::after { content: ""; }
  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }



  /* === Entity Model frame === */
  .em-frame {
    opacity: 0;
    transition: opacity 800ms ease 400ms;
  }
  .em-frame.in { opacity: 1; }
  .em-subdivider {
    opacity: 0;
    transition: opacity 800ms ease 600ms;
  }
  .em-subdivider.in { opacity: 1; }
  .em-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 17px;
    font-weight: 600;
    fill: rgba(123, 165, 255, 1);   /* matches brand-blue boundary */
    letter-spacing: 0.30em;
    opacity: 0;
    transition: opacity 800ms ease 700ms;
  }
  .em-label.in { opacity: 1; }


  /* Thinking dots — cycle while AI is "working" between message parts */
  .thinking-dots {
    display: inline-block;
    color: var(--ai-purple-soft);
    font-weight: 600;
    margin-left: 2px;
  }
  .dot-pad { color: transparent; }
  .typed-text.no-cursor::after { content: ""; }

  /* Followup line — wraps both Phase A (Researching…) and Phase B (Adding entities…)
     so they share the same y-position and we can fade between them. */
  .ai-followup-line {
    transition: opacity 200ms ease;
    white-space: nowrap;
    overflow: visible;
  }
  .ai-followup-line.fading { opacity: 0; }
  /* Opener stays single-line too (it's short, but keeping behaviour consistent) */
  .ai-opener-line { white-space: nowrap; }

  /* PT phrasings are longer than EN — "A consultar as diretivas europeias
     de contratação pública" overflows the 280px column. Allow wrap in PT only;
     EN keeps nowrap to prevent mid-typing layout jitter. */
  .lang-pt .ai-followup-line { white-space: normal; overflow-wrap: break-word; }


  /* Language badge — top-left toggle */
  .lang-badge {
    position: absolute;
    left: 22px; top: 22px;
    z-index: 70;
    display: inline-flex;
    align-items: center;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 999px;
    padding: 2px;
    backdrop-filter: blur(8px);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .lang-badge button {
    background: transparent;
    border: none;
    color: var(--ink-2);
    padding: 5px 11px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
    transition: color 200ms ease, background 200ms ease;
  }
  .lang-badge button:hover { color: #fff; }
  .lang-badge button.active {
    background: rgba(91,138,236,0.18);
    color: #fff;
    border: 1px solid rgba(123,165,255,0.45);
  }

  /* Multi-line labels in PT keep individual lines short, so we can stay at the
     standard 19px. The em-label (curved arc text) does still benefit from a
     gentler tracking in PT since its arc length is fixed. */
  .lang-pt .em-label { font-size: 15px; letter-spacing: 0.24em; }

  /* Face glow on centre hover */
  .codesigner-face {
    transition: filter 220ms ease, transform 220ms cubic-bezier(.25,.6,.2,1);
  }
  .codesigner-face.face-hover {
    filter: drop-shadow(0 0 14px rgba(196,132,255,0.85)) drop-shadow(0 0 24px rgba(196,132,255,0.45));
    transform: scale(1.08);
  }
  .codesigner-face.face-hover .face-glow {
    opacity: 0.45;
  }

  /* ——— Top bar (matches homepage) ——— */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: rgba(10, 14, 20, 0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(184, 196, 220, 0.06);
  }
  .topbar-left { display: flex; align-items: center; gap: 40px; }
  .topbar a.wordmark-link { display: block; line-height: 0; }
  .topbar .wordmark-sm { height: 22px; width: auto; display: block; }
  .topbar .wordmark-sm .cerno-path { fill: var(--ink-0); }
  .topbar .wordmark-sm .flow-path  { fill: var(--brand-blue-soft); }
  .topbar-nav { display: flex; align-items: center; gap: 28px; }
  .topbar-nav a {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 13.5px;
    color: var(--ink-2);
    text-decoration: none;
    letter-spacing: 0.005em;
    transition: color 180ms ease;
    position: relative;
    padding: 4px 0;
  }
  .topbar-nav a:hover { color: var(--ink-0); }
  .topbar-nav a::after {
    content: "";
    position: absolute;
    bottom: -2px; left: 0;
    height: 1px; width: 0;
    background: var(--brand-blue-soft);
    transition: width 180ms ease;
  }
  .topbar-nav a:hover::after { width: 100%; }

// === GEOMETRY ===
// SVG viewBox 1000x1000, centre at (500, 500)
const CX = 500, CY = 500;
const R_CENTER       = 100;   // AI Co-designer disc
const R_EM_INNER     = 102;   // Entity Model zone inner edge
const R_EM_LABEL     = 245;   // sits inside the inner-ring band, NEAR (not on) the boundary
const R_FACETS_INNER = 252;   // visual divider inside the entity model zone (subtle)
const R_INNER_INNER  = 102;   // wedges fill from R_EM_INNER outward
const R_INNER_OUTER  = 280;   // entity model outer edge / solution ring inner edge
const R_OUTER_OUTER  = 480;   // solution ring outer edge
const R_FRAME        = 496;   // compliance frame band centre line
const R_FRAME_BAND   = 16;    // half-width of compliance band
const R_FRAME_LABEL_R = 510;  // labels sit on the band centre line

function deg2rad(d) { return (d * Math.PI) / 180; }
function polar(angleDeg, r) {
  const a = deg2rad(angleDeg);
  return { x: CX + Math.cos(a) * r, y: CY + Math.sin(a) * r };
}

function annularSector(rInner, rOuter, a1Deg, a2Deg) {
  const a1 = deg2rad(a1Deg);
  const a2 = deg2rad(a2Deg);
  const p1 = { x: CX + rOuter * Math.cos(a1), y: CY + rOuter * Math.sin(a1) };
  const p2 = { x: CX + rOuter * Math.cos(a2), y: CY + rOuter * Math.sin(a2) };
  const p3 = { x: CX + rInner * Math.cos(a2), y: CY + rInner * Math.sin(a2) };
  const p4 = { x: CX + rInner * Math.cos(a1), y: CY + rInner * Math.sin(a1) };
  const large = a2Deg - a1Deg > 180 ? 1 : 0;
  return `M ${p1.x} ${p1.y}
          A ${rOuter} ${rOuter} 0 ${large} 1 ${p2.x} ${p2.y}
          L ${p3.x} ${p3.y}
          A ${rInner} ${rInner} 0 ${large} 0 ${p4.x} ${p4.y}
          Z`;
}

// Path for curved text along an arc.
// flip=true means the text reads upright when the arc is on the bottom half
// (we draw the arc right-to-left, which inverts text-on-path direction)
function arcPath(r, a1Deg, a2Deg, flip = false) {
  const a1 = deg2rad(a1Deg);
  const a2 = deg2rad(a2Deg);
  const p1 = { x: CX + r * Math.cos(a1), y: CY + r * Math.sin(a1) };
  const p2 = { x: CX + r * Math.cos(a2), y: CY + r * Math.sin(a2) };
  const large = Math.abs(a2Deg - a1Deg) > 180 ? 1 : 0;
  const sweep = flip ? 0 : 1;
  const start = flip ? p2 : p1;
  const end   = flip ? p1 : p2;
  return `M ${start.x} ${start.y} A ${r} ${r} 0 ${large} ${sweep} ${end.x} ${end.y}`;
}

// Determine if a wedge's centre angle is on the bottom half (flip needed)
function isBottomHalf(angleDeg) {
  // In SVG (+y down), bottom half is where sin(angle) > 0.
  return Math.sin(deg2rad(angleDeg)) > 0.30;
}

// Animation timeline
const T_HEADLINE   = 200;
const T_CENTER     = 1100;
const T_INNER_BASE = 1700;
const T_INNER_STAG = 220;
const T_OUTER_BASE = T_INNER_BASE + 5 * T_INNER_STAG + 200;
const T_OUTER_STAG = 220;
const T_LABELS     = T_OUTER_BASE + 5 * T_OUTER_STAG + 200;
const T_FRAME      = T_LABELS + 800;     // compliance ring sweeps in last
const T_CONVO      = T_FRAME + 2800;     // sweep is 1800ms; this gives a clear 1s pause after sweep before convo
const T_CONVO_DONE = T_CONVO + 16000;    // left column reveals once conversation has played through (longer convo)
const T_DONE       = T_CONVO + 16500;


function useTypewriter(text, startMs, charMs = 28) {
  const [shown, setShown] = useState("");
  const [done, setDone] = useState(false);
  const tickRef = useRef(0);
  useEffect(() => {
    setShown(""); setDone(false);
    let cancelled = false;
    const timers = [];
    timers.push(setTimeout(() => {
      let i = 0;
      const tick = () => {
        if (cancelled) return;
        i += 1;
        setShown(text.slice(0, i));
        if (i < text.length) timers.push(setTimeout(tick, charMs));
        else timers.push(setTimeout(() => setDone(true), 600));
      };
      tick();
    }, startMs));
    return () => { cancelled = true; timers.forEach(clearTimeout); };
  }, [text, startMs, charMs, tickRef.current]);
  return { shown, done };
}

function Conversation({ active, onWinkTrigger, onPhase, T }) {
  // Sequence (no fade — every line stays):
  //   user types prompt (centred, scaled up)
  //   pause 600ms
  //   onPhase('slide')  -> App starts the slide right + disc fades in (overlapping)
  //   slide completes
  //   "I've got this!"  -> wink fires after typing completes
  //   "Reviewing EU procurement directives" + brief cycling dots, settles to "..."
  //                     -> onPhase('frame') after the line settles
  //   "Adding entities"           -> onPhase('structure') as line completes
  //   "Adding lifecycles"         -> onPhase('lifecycle')
  //   "Adding views"              -> onPhase('views')   (Workflows/Records appear silently shortly after)
  //   "Finalising configuration"  -> onPhase('outer')   (outer ring wedges stagger in)
  //   "Finalising compliance"     -> onPhase('compliance') (compliance ring-fence sweeps in)
  //   "Deploying to sandbox..."   (closing status; no visual trigger)
  //   "ready for human review."   (closing statement; no visual trigger)
  const USER_PROMPT     = T.userPrompt;
  const AI_REPLY_OPENER = T.aiOpener;
  const AI_LINE_RESEARCH  = T.aiResearch;
  const AI_LINE_ENTITIES  = T.aiEntities;
  const AI_LINE_LIFECYCLE = T.aiLifecycle;
  const AI_LINE_VIEWS     = T.aiViews;
  const AI_LINE_FINAL     = T.aiFinal;
  const AI_LINE_FINAL_COMPLIANCE = T.aiFinalCompliance;
  const AI_LINE_DEPLOYING       = T.aiDeploying;
  const AI_LINE_READY_FOR_REVIEW = T.aiReadyForReview;

  const USER_CHAR_MS = 42;
  const AI_CHAR_MS   = 24;
  const DOTS_MS      = 1700;
  const PAUSE_AFTER_LINE = 250;
  const PAUSE_AFTER_DOTS = 350;
  const PAUSE_AFTER_USER   = 600;   // beat after user prompt before AI face fades in (still centred)
  const FACE_FADE_MS       = 600;   // disc fade-in duration before opener starts typing
  const PAUSE_AFTER_OPENER = 600;   // beat after "I've got this!" before convo slides right
  const SLIDE_MS           = 1400;  // matches the .convo-floater CSS transition duration

  const userMs        = USER_PROMPT.length * USER_CHAR_MS;
  // Phase 0: pixie dust — three beats over ~3 seconds.
  //   0–1500ms:  sparkles twinkle in sequence at the face spot ("something's brewing")
  //   1300–2300: soft smoke cloud gathers (overlaps the sparkle tail)
  //   2000ms+:   face fades in from inside the cloud
  const pixieDustAt   = userMs + PAUSE_AFTER_USER;
  const PIXIE_TOTAL_MS = 3000;       // full dust runtime before cleanup
  // Phase 1: face fade-in begins partway through, when the smoke has gathered.
  const centerInAt    = pixieDustAt + 2000;
  // Opener "I've got this!" starts typing once the face has materialised.
  const openerStart   = centerInAt + FACE_FADE_MS;
  const openerMs      = AI_REPLY_OPENER.length * AI_CHAR_MS;
  // Wink fires right after opener typed
  const winkStart     = openerStart + openerMs + 250;
  // Phase 2: now slide the conversation right. Face stays in centre.
  const slidePhaseAt  = openerStart + openerMs + PAUSE_AFTER_OPENER;

  const lineRStart    = slidePhaseAt + SLIDE_MS + 200;
  const lineRMs       = AI_LINE_RESEARCH.length * AI_CHAR_MS;
  const dotsRStart    = lineRStart + lineRMs + 100;
  const dotsREnd      = dotsRStart + DOTS_MS;
  const framePhaseAt  = dotsREnd;          // entity model frame draws when research settles

  const lineEStart    = dotsREnd + PAUSE_AFTER_DOTS;
  const lineEMs       = AI_LINE_ENTITIES.length * AI_CHAR_MS;
  const structPhaseAt = lineEStart + Math.floor(lineEMs * 0.6);  // wedge appears as line is being typed (60% in)

  const lineLStart    = lineEStart + lineEMs + PAUSE_AFTER_LINE;
  const lineLMs       = AI_LINE_LIFECYCLE.length * AI_CHAR_MS;
  const lifePhaseAt   = lineLStart + Math.floor(lineLMs * 0.6);

  const lineVStart    = lineLStart + lineLMs + PAUSE_AFTER_LINE;
  const lineVMs       = AI_LINE_VIEWS.length * AI_CHAR_MS;
  const viewPhaseAt   = lineVStart + Math.floor(lineVMs * 0.6);
  const innerRestAt   = lineVStart + lineVMs + 400;  // Workflows + Records appear silently shortly after Views

  const lineFStart    = lineVStart + lineVMs + PAUSE_AFTER_LINE + 300;
  const lineFMs       = AI_LINE_FINAL.length * AI_CHAR_MS;
  const outerPhaseAt  = lineFStart + Math.floor(lineFMs * 0.3);  // outer ring starts staggering in early in 'Finalising configuration'

  // New: 'Finalising compliance' line types after the outer ring has had time to land,
  // and 30% through the line the compliance ring-fence sweeps in (mirroring the outer pattern).
  const lineFCStart   = lineFStart + lineFMs + PAUSE_AFTER_LINE + 900;  // pause lets outer wedges finish staggering
  const lineFCMs      = AI_LINE_FINAL_COMPLIANCE.length * AI_CHAR_MS;
  const compliancePhaseAt = lineFCStart + Math.floor(lineFCMs * 0.3);

  // Closing two-line beat after the compliance ring lands.
  //   "Deploying to sandbox..."    (status line, in-progress)
  //   "ready for human review."    (closing statement)
  // The first line starts ~1500ms after the compliance ring fires, giving the
  // ring-fence time to visibly seat. The second line follows after a brief pause.
  const lineDStart    = compliancePhaseAt + 1500;
  const lineDMs       = AI_LINE_DEPLOYING.length * AI_CHAR_MS;
  const lineRevStart  = lineDStart + lineDMs + PAUSE_AFTER_LINE + 300;
  const lineRevMs     = AI_LINE_READY_FOR_REVIEW.length * AI_CHAR_MS;
  const deployedEnd   = lineRevStart + lineRevMs;

  const user      = useTypewriter(active ? USER_PROMPT : "",       0,           USER_CHAR_MS);
  const opener    = useTypewriter(active ? AI_REPLY_OPENER : "",   openerStart, AI_CHAR_MS);
  const research  = useTypewriter(active ? AI_LINE_RESEARCH : "",  lineRStart,  AI_CHAR_MS);
  const entities  = useTypewriter(active ? AI_LINE_ENTITIES : "",  lineEStart,  AI_CHAR_MS);
  const lifecycle = useTypewriter(active ? AI_LINE_LIFECYCLE : "", lineLStart,  AI_CHAR_MS);
  const views     = useTypewriter(active ? AI_LINE_VIEWS : "",     lineVStart,  AI_CHAR_MS);
  const finalLine = useTypewriter(active ? AI_LINE_FINAL : "",     lineFStart,  AI_CHAR_MS);
  const finalLineCompliance = useTypewriter(active ? AI_LINE_FINAL_COMPLIANCE : "", lineFCStart, AI_CHAR_MS);
  const deployingLine = useTypewriter(active ? AI_LINE_DEPLOYING : "", lineDStart, AI_CHAR_MS);
  const reviewLine    = useTypewriter(active ? AI_LINE_READY_FOR_REVIEW : "", lineRevStart, AI_CHAR_MS);

  // Wink + phase callbacks
  // We capture onPhase/onWinkTrigger in refs so that callback identity changes
  // (which happen every App render) don't reset the timer schedule.
  const onPhaseRef = useRef(onPhase);
  const onWinkRef  = useRef(onWinkTrigger);
  useEffect(() => { onPhaseRef.current = onPhase; }, [onPhase]);
  useEffect(() => { onWinkRef.current = onWinkTrigger; }, [onWinkTrigger]);

  useEffect(() => {
    if (!active) return;
    const timers = [];
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('pixieDust'),    pixieDustAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('pixieDustEnd'), pixieDustAt + PIXIE_TOTAL_MS + 100));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('centerIn'),   centerInAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('slide'),      slidePhaseAt));
    timers.push(setTimeout(() => onWinkRef.current  && onWinkRef.current(),              winkStart));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('frame'),      framePhaseAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('structure'),  structPhaseAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('lifecycle'),  lifePhaseAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('views'),      viewPhaseAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('innerRest'),  innerRestAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('outer'),      outerPhaseAt));
    timers.push(setTimeout(() => onPhaseRef.current && onPhaseRef.current('compliance'), compliancePhaseAt));
    return () => timers.forEach(clearTimeout);
  }, [active, winkStart, pixieDustAt, centerInAt, slidePhaseAt, framePhaseAt, structPhaseAt, lifePhaseAt, viewPhaseAt, innerRestAt, outerPhaseAt, compliancePhaseAt]);

  // Dots cycler — research line only
  function useDotsCycler(startMs, endMs) {
    const [phase, setPhase] = useState(0);
    const [settled, setSettled] = useState(false);
    useEffect(() => {
      if (!active) { setPhase(0); setSettled(false); return; }
      let intervalId = null;
      const startTimer = setTimeout(() => {
        setPhase(1);
        let i = 1;
        intervalId = setInterval(() => {
          i = (i % 3) + 1;
          setPhase(i);
        }, 380);
      }, startMs);
      const endTimer = setTimeout(() => {
        if (intervalId) clearInterval(intervalId);
        setPhase(0);
        setSettled(true);
      }, endMs);
      return () => {
        clearTimeout(startTimer);
        clearTimeout(endTimer);
        if (intervalId) clearInterval(intervalId);
      };
    }, [active, startMs, endMs]);
    return { phase, settled };
  }
  const dotsR = useDotsCycler(dotsRStart, dotsREnd);
  const renderDotTail = (cycler) => {
    if (cycler.phase > 0) return <span className="thinking-dots">{".".repeat(cycler.phase)}</span>;
    if (cycler.settled)   return <span>...</span>;
    return null;
  };

  // Helper: hide cursor once a line is typed AND the next line has begun OR the dots cycle is active/settled
  const lineFullyTyped = (tw, fullText) => tw.shown.length === fullText.length;

  return (
    <div className="convo-inline" style={{ opacity: active ? 1 : 0, transition: "opacity 600ms ease" }}>
      <div className="convo-line user-line">
        <span className={`typed-text ${user.done ? "done" : ""}`}>{user.shown}</span>
      </div>
      <div className="convo-line ai-line">
        {/* Opener — only renders once the AI actually starts speaking
            (otherwise we'd show a purple cursor on an empty line while the user types) */}
        {opener.shown.length > 0 ? (
          <div className={`typed-text ai-opener-line ${opener.done ? "no-cursor" : ""}`}>
            {opener.shown}
          </div>
        ) : null}
        {/* Research line */}
        {opener.done ? (
          <div className={`typed-text ai-followup-line ${dotsR.phase > 0 || dotsR.settled || entities.shown.length > 0 ? "no-cursor" : ""}`}>
            {research.shown}
            {lineFullyTyped(research, AI_LINE_RESEARCH) ? renderDotTail(dotsR) : null}
          </div>
        ) : null}
        {/* Adding entities */}
        {dotsR.settled ? (
          <div className={`typed-text ai-followup-line ${lineFullyTyped(entities, AI_LINE_ENTITIES) && lifecycle.shown.length === 0 ? "" : (lineFullyTyped(entities, AI_LINE_ENTITIES) ? "no-cursor" : "")}`}>
            {entities.shown}
            {lineFullyTyped(entities, AI_LINE_ENTITIES) ? <span>...</span> : null}
          </div>
        ) : null}
        {/* Adding lifecycles */}
        {lineFullyTyped(entities, AI_LINE_ENTITIES) && lifecycle.shown.length > 0 ? (
          <div className={`typed-text ai-followup-line ${lineFullyTyped(lifecycle, AI_LINE_LIFECYCLE) && views.shown.length === 0 ? "" : (lineFullyTyped(lifecycle, AI_LINE_LIFECYCLE) ? "no-cursor" : "")}`}>
            {lifecycle.shown}
            {lineFullyTyped(lifecycle, AI_LINE_LIFECYCLE) ? <span>...</span> : null}
          </div>
        ) : null}
        {/* Adding views */}
        {lineFullyTyped(lifecycle, AI_LINE_LIFECYCLE) && views.shown.length > 0 ? (
          <div className={`typed-text ai-followup-line ${lineFullyTyped(views, AI_LINE_VIEWS) && finalLine.shown.length === 0 ? "" : (lineFullyTyped(views, AI_LINE_VIEWS) ? "no-cursor" : "")}`}>
            {views.shown}
            {lineFullyTyped(views, AI_LINE_VIEWS) ? <span>...</span> : null}
          </div>
        ) : null}
        {/* Finalising configuration */}
        {lineFullyTyped(views, AI_LINE_VIEWS) && finalLine.shown.length > 0 ? (
          <div className={`typed-text ai-followup-line ${lineFullyTyped(finalLine, AI_LINE_FINAL) && finalLineCompliance.shown.length === 0 ? "" : (lineFullyTyped(finalLine, AI_LINE_FINAL) ? "no-cursor" : "")}`}>
            {finalLine.shown}
            {lineFullyTyped(finalLine, AI_LINE_FINAL) ? <span>...</span> : null}
          </div>
        ) : null}
        {/* Finalising compliance — triggers the compliance ring-fence */}
        {lineFullyTyped(finalLine, AI_LINE_FINAL) && finalLineCompliance.shown.length > 0 ? (
          <div className={`typed-text ai-followup-line ${lineFullyTyped(finalLineCompliance, AI_LINE_FINAL_COMPLIANCE) && deployingLine.shown.length === 0 ? "" : (lineFullyTyped(finalLineCompliance, AI_LINE_FINAL_COMPLIANCE) ? "no-cursor" : "")}`}>
            {finalLineCompliance.shown}
            {lineFullyTyped(finalLineCompliance, AI_LINE_FINAL_COMPLIANCE) ? <span>...</span> : null}
          </div>
        ) : null}
        {/* Deploying to sandbox — closing status line */}
        {lineFullyTyped(finalLineCompliance, AI_LINE_FINAL_COMPLIANCE) && deployingLine.shown.length > 0 ? (
          <div className={`typed-text ai-followup-line ${lineFullyTyped(deployingLine, AI_LINE_DEPLOYING) && reviewLine.shown.length === 0 ? "" : (lineFullyTyped(deployingLine, AI_LINE_DEPLOYING) ? "no-cursor" : "")}`}>
            {deployingLine.shown}
            {lineFullyTyped(deployingLine, AI_LINE_DEPLOYING) ? <span>...</span> : null}
          </div>
        ) : null}
        {/* ready for human review. — closing statement */}
        {lineFullyTyped(deployingLine, AI_LINE_DEPLOYING) && reviewLine.shown.length > 0 ? (
          <div className={`typed-text ai-followup-line ${lineFullyTyped(reviewLine, AI_LINE_READY_FOR_REVIEW) ? "no-cursor" : ""}`}>
            {reviewLine.shown}
          </div>
        ) : null}
      </div>
    </div>
  );
}

function App() {
  const [tick, setTick] = useState(0);
  // Read the active language from the site-wide signal. The page is reloaded
  // on switch (data-reload-on-lang on <html>), so the React state is set once
  // on mount and never changes within a session.
  const initialLang = (window.cernoflowI18n && window.cernoflowI18n.get && STRINGS[window.cernoflowI18n.get()]) ? window.cernoflowI18n.get() : "en";
  const [lang, setLang] = useState(initialLang);
  const T = STRINGS[lang];
  const COMPLIANCE = T.compliance;
  const [winkActive, setWinkActive] = useState(false);
  const [convoIn, setConvoIn] = useState(false);            // convo starts (user typing begins)
  const [convoSettled, setConvoSettled] = useState(false);  // convo has translated from centre to right column
  const [convoDone, setConvoDone] = useState(false);        // entire convo finished — left column may appear
  const [blinkKey, setBlinkKey] = useState(0);
  const triggerWink = () => {
    setWinkActive(false);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => setWinkActive(true));
      setTimeout(() => setWinkActive(false), 400);
    });
  };

  const [headIn, setHeadIn]       = useState(false);
  const [faceIn, setFaceIn]       = useState(false);  // face visible (perched left of convo when first true)
  const [discIn, setDiscIn]       = useState(false);  // centre disc + pulse visible (face is also centred by now)
  const [dustOn, setDustOn]       = useState(false);  // pixie dust burst — fires just before the face appears
  const [frameIn, setFrameIn]     = useState(false);  // entity model frame + EM label visible
  const [innerIn, setInnerIn]     = useState(() => new Set());
  const [outerIn, setOuterIn]     = useState(() => new Set());
  const [flashed, setFlashed]     = useState(() => new Set());  // wedges currently flash-highlighted (Co-designer points at them)
  const [labelsIn, setLabelsIn]   = useState(false);  // wedge labels visible
  const [complianceIn, setComplianceIn] = useState(false);
  const [hovered, setHovered]     = useState(null);
  const [showReplay, setShowReplay] = useState(false);
  const [tc, setTc] = useState("00:00");
  const startRef = useRef(0);
  const timersRef = useRef([]);

  function clearTimers() {
    timersRef.current.forEach(clearTimeout);
    timersRef.current = [];
  }

  // Phase callback dispatched by the Conversation component as it types.
  // Briefly flash-highlight a wedge (same visual as mouse hover)
  function flashWedge(key, durationMs = 1200) {
    setFlashed(prev => { const n = new Set(prev); n.add(key); return n; });
    timersRef.current.push(setTimeout(() => {
      setFlashed(prev => { const n = new Set(prev); n.delete(key); return n; });
    }, durationMs));
  }

  function handleConvoPhase(phase) {
    if (phase === 'pixieDust') {
      // Sparkle burst at the spot where the face is about to appear — summons it into being.
      setDustOn(true);
    } else if (phase === 'pixieDustEnd') {
      // Animation has played; remove the dust elements so they don't sit in the DOM.
      setDustOn(false);
    } else if (phase === 'centerIn') {
      // User finished prompt; the AI face (no disc) fades in to the LEFT of the
      // still-centred conversation. Opener "I've got this!" will type next.
      setFaceIn(true);
    } else if (phase === 'slide') {
      // Opener has been typed (and winked). Three things happen together:
      //   - Conversation slides to the right column
      //   - Face migrates from its perched position to the SVG centre
      //   - Disc + pulse fade in behind the face
      setConvoSettled(true);
      setDiscIn(true);
    } else if (phase === 'frame') {
      setFrameIn(true);
    } else if (phase === 'structure') {
      setInnerIn(prev => { const n = new Set(prev); n.add('structure'); return n; });
      flashWedge('structure');
    } else if (phase === 'lifecycle') {
      setInnerIn(prev => { const n = new Set(prev); n.add('lifecycle'); return n; });
      flashWedge('lifecycle');
    } else if (phase === 'views') {
      setInnerIn(prev => { const n = new Set(prev); n.add('views'); return n; });
      flashWedge('views');
    } else if (phase === 'innerRest') {
      // Workflows + Records appear silently — no flash
      setInnerIn(prev => { const n = new Set(prev); n.add('workflows'); n.add('records'); return n; });
    } else if (phase === 'outer') {
      // Outer wedges fade in one at a time as Co-designer says "Finalising configuration".
      // Each wedge appears + flashes ~250ms after the previous one — same per-wedge
      // attention pattern as the inner ring, just at a brisker pace.
      OUTER_WEDGES.forEach((w, i) => {
        timersRef.current.push(setTimeout(() => {
          setOuterIn(prev => { const n = new Set(prev); n.add(w.key); return n; });
          flashWedge(w.key, 900);
        }, i * 200));
      });
    } else if (phase === 'compliance') {
      setComplianceIn(true);
      // Once the compliance sweep completes, the closing two-line beat types out:
      //   "Deploying to sandbox..."  (scheduled at compliancePhaseAt + 1500)
      //   "ready for human review."  (scheduled after the line above completes)
      // We then reveal the headline + subtitle, followed by the replay button.
      // The delays here are measured from compliancePhaseAt and must clear both lines.
      setTimeout(() => setHeadIn(true), 4200);
      // Heading fade is 1400ms; let it nearly land before the replay button arrives.
      setTimeout(() => setConvoDone(true), 4800);
      setTimeout(() => setShowReplay(true), 5800);
    }
  }

  useEffect(() => {
    clearTimers();
    setHeadIn(false); setFrameIn(false); setFaceIn(false); setDiscIn(false); setDustOn(false);
    setInnerIn(new Set()); setOuterIn(new Set()); setFlashed(new Set());
    setLabelsIn(false); setComplianceIn(false);
    setConvoIn(false); setConvoSettled(false); setConvoDone(false);
    setBlinkKey(0); setHovered(null); setShowReplay(false);
    startRef.current = performance.now();

    // Heading is now revealed at the END, after the compliance sweep completes
    // (see handleConvoPhase 'compliance' branch). Letting the diagram build first
    // and then framing it with the heading reads as the closing thesis.
    // Conversation starts the moment the scene mounts — the user begins typing.
    timersRef.current.push(setTimeout(() => setConvoIn(true), 900));

    const iv = setInterval(() => {
      const ms = performance.now() - startRef.current;
      const s = Math.max(0, Math.floor(ms / 1000));
      const mm = String(Math.floor(s / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      setTc(`${mm}:${ss}`);
    }, 250);
    return () => { clearTimers(); clearInterval(iv); };
  }, [tick, lang]);

  const tipText = hovered ? T.tips[hovered] : null;

  // Curved label paths for inner ring
  // For each wedge, we need a path along which the text is drawn.
  // Convention: bottom-half wedges (centre angle 0..180 exclusive) need a flipped
  // arc so the text reads upright.
  // Inner labels: arc at radius R_INNER_LABEL, midway between rings
  const R_INNER_LABEL = 176;   // pulled inward (~one font-height) toward the disc
  const R_OUTER_LABEL = 380;   // centre of outer-ring band (280 + 480)/2
  const R_FRAME_LABEL = 496;   // sits along the compliance frame

  return (
    <div className={`stage lang-${lang}`}>
      <div className="scene">

        <div className={`heading-block ${headIn ? "in" : ""}`}>
          <h1 className="headline">{T.headline}</h1>
          <p className="subtitle">{T.subtitle}</p>
        </div>

        <div className="diagram-wrap">
          <svg viewBox="0 0 1000 1000">
            <defs>
              <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%"  stopColor="#1a2238" stopOpacity="1" />
                <stop offset="60%" stopColor="#0f1729" stopOpacity="1" />
                <stop offset="100%" stopColor="#0a0f1a" stopOpacity="1" />
              </radialGradient>
              <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%"  stopColor="#5B8AEC" stopOpacity=".22" />
                <stop offset="60%" stopColor="#5B8AEC" stopOpacity=".06" />
                <stop offset="100%" stopColor="#5B8AEC" stopOpacity="0" />
              </radialGradient>

              {/* Curved-text paths */}
              {/* Inner ring labels — halfSpan 28° gives the label nearly the full
                  72° wedge with an 8° divider buffer either side. Was 14° (cramped). */}
              {INNER_WEDGES.map(w => {
                const flip = isBottomHalf(w.center);
                const halfSpan = 28;
                const a1 = w.center - halfSpan;
                const a2 = w.center + halfSpan;
                // Shift path inward (top) or outward (bottom-flipped) so glyphs centre on band
                const labelR = R_INNER_LABEL + (flip ? 5.5 : -5.5);
                return (
                  <path
                    key={`tp-inner-${w.key}`}
                    id={`tp-inner-${w.key}`}
                    d={arcPath(labelR, a1, a2, flip)}
                    fill="none"
                  />
                );
              })}
              {/* Outer ring labels — same widening */}
              {OUTER_WEDGES.map(w => {
                const flip = isBottomHalf(w.center);
                const halfSpan = 28;
                const a1 = w.center - halfSpan;
                const a2 = w.center + halfSpan;
                const labelR = R_OUTER_LABEL + (flip ? 5.5 : -5.5);
                return (
                  <path
                    key={`tp-outer-${w.key}`}
                    id={`tp-outer-${w.key}`}
                    d={arcPath(labelR, a1, a2, flip)}
                    fill="none"
                  />
                );
              })}
              {/* Compliance frame labels */}
              {COMPLIANCE.map(c => {
                const flip = isBottomHalf(c.center);
                const halfSpan = 8;
                const a1 = c.center - halfSpan;
                const a2 = c.center + halfSpan;
                const labelR = R_FRAME_LABEL + (flip ? 4.5 : -4.5);
                return (
                  <path
                    key={`tp-frame-${c.key}`}
                    id={`tp-frame-${c.key}`}
                    d={arcPath(labelR, a1, a2, flip)}
                    fill="none"
                  />
                );
              })}
            </defs>

            {/* Compliance frame BAND — inner edge + outer edge with subtle fill between */}
            <path
              d={annularSector(R_FRAME - R_FRAME_BAND, R_FRAME + R_FRAME_BAND, -180, 180)}
              fill="rgba(232,121,249,0.05)"
              stroke="none"
              className={`compliance-band-fill ${complianceIn ? "in" : ""} ${hovered === "compliance" ? "hovered" : ""}`}
            />
            {/* Hover interaction layer for the compliance frame — thick stroked circle covers the band */}
            <circle
              cx={CX} cy={CY} r={R_FRAME}
              fill="none"
              stroke="transparent"
              strokeWidth={R_FRAME_BAND * 2 + 12}
              style={{ cursor: "pointer", pointerEvents: complianceIn ? "stroke" : "none" }}
              onMouseEnter={() => setHovered("compliance")}
              onMouseLeave={() => setHovered(null)} />
            <circle
              cx={CX} cy={CY} r={R_FRAME - R_FRAME_BAND}
              fill="none"
              stroke="rgba(232,121,249,0.55)"
              strokeWidth="1.4"
              className={`compliance-band-edge ${complianceIn ? "in" : ""} ${hovered === "compliance" ? "hovered" : ""}`}
            />
            <circle
              cx={CX} cy={CY} r={R_FRAME + R_FRAME_BAND}
              fill="none"
              stroke="rgba(232,121,249,0.55)"
              strokeWidth="1.4"
              className={`compliance-band-edge ${complianceIn ? "in" : ""} ${hovered === "compliance" ? "hovered" : ""}`}
            />

            {/* Compliance frame labels — all curved on band centre */}
            {COMPLIANCE.map(c => (
              <text
                key={`flbl-${c.key}`}
                
                className={`compliance-label ${complianceIn ? "in" : ""}`}
              >
                <textPath href={`#tp-frame-${c.key}`} startOffset="50%" textAnchor="middle">
                  {c.label}
                </textPath>
              </text>
            ))}

            {/* === "THE ENTITY MODEL" curved label path — defined here, rendered AFTER wedges so the halo can mask the wedge strokes === */}
            <defs>
              <path
                id="tp-em-label"
                d={arcPath(R_EM_LABEL, -136, -44, false)}
                fill="none"
              />
            </defs>

            {/* Inner ring wedge fills */}
            {INNER_WEDGES.map(w => {
              const isHot = hovered === w.key || flashed.has(w.key);
              return (
                <path
                  key={`iw-${w.key}`}
                  d={annularSector(R_INNER_INNER, R_INNER_OUTER, w.span[0], w.span[1])}
                  fill={isHot ? TINTS[w.tint].hover : TINTS[w.tint].fill}
                  stroke={TINTS[w.tint].stroke}
                  strokeWidth="1"
                  className={`wedge ${innerIn.has(w.key) ? "in" : ""} ${flashed.has(w.key) ? "flashed" : ""}`}
                  style={{ "--hover-fill": TINTS[w.tint].hover, "--hover-glow": TINTS[w.tint].accent }}
                  onMouseEnter={() => setHovered(w.key)}
                  onMouseLeave={() => setHovered(null)}
                />
              );
            })}

            {/* Outer ring wedge fills */}
            {OUTER_WEDGES.map(w => {
              const isHot = hovered === w.key || flashed.has(w.key);
              return (
                <path
                  key={`ow-${w.key}`}
                  d={annularSector(R_INNER_OUTER, R_OUTER_OUTER, w.span[0], w.span[1])}
                  fill={isHot ? TINTS[w.tint].hover : TINTS[w.tint].fill}
                  stroke={TINTS[w.tint].stroke}
                  strokeWidth="1"
                  className={`wedge ${outerIn.has(w.key) ? "in" : ""} ${flashed.has(w.key) ? "flashed" : ""}`}
                  style={{ "--hover-fill": TINTS[w.tint].hover, "--hover-glow": TINTS[w.tint].accent }}
                  onMouseEnter={() => setHovered(w.key)}
                  onMouseLeave={() => setHovered(null)}
                />
              );
            })}

            {/* Wedge dividers (radial lines aligned for both rings) */}
            {INNER_WEDGES.map(w => {
              const inner = polar(w.span[0], R_INNER_INNER);
              const outer = polar(w.span[0], R_OUTER_OUTER);
              return (
                <line
                  key={`div-${w.key}`}
                  x1={inner.x} y1={inner.y} x2={outer.x} y2={outer.y}
                  className={`wedge-divider ${complianceIn ? "in" : ""}`}
                />
              );
            })}

            {/* === Entity Model FRAME — two matching strong brand-blue borders === */}
            {/* Inner: where AI centre meets entity model */}
            <circle cx={CX} cy={CY} r={R_INNER_INNER}
                    fill="none" stroke="rgba(123,165,255,0.95)" strokeWidth="2.5"
                    className={`em-frame ${frameIn ? "in" : ""}`} />
            {/* Outer: where entity model meets solution-level concerns. Full circle now
                that the EM label sits inside the inner band, not on the line. */}
            <circle cx={CX} cy={CY} r={R_INNER_OUTER}
                    fill="none" stroke="rgba(123,165,255,0.95)" strokeWidth="2.5"
                    className={`em-frame ${frameIn ? "in" : ""}`} />
            {/* Solution outer edge — neutral; appears with the compliance ring sweep */}
            <circle cx={CX} cy={CY} r={R_OUTER_OUTER}
                    fill="none" stroke="rgba(148,163,184,0.18)" strokeWidth="1"
                    className={`ring-edge ${complianceIn ? "in" : ""}`} />

            {/* "THE ENTITY MODEL" curved label — sits inside the inner band, near (not on) the boundary. */}
            <text className={`em-label ${frameIn ? "in" : ""}`}>
              <textPath href="#tp-em-label" startOffset="50%" textAnchor="middle">
                {T.emLabel}
              </textPath>
            </text>

            {/* Inner ring labels — curved if vertical-friendly, straight if side */}
            {INNER_WEDGES.map(w => {
              const sinAbs = Math.abs(Math.sin(deg2rad(w.center)));
              const useCurve = true;
              const isIn = innerIn.has(w.key);
              const wedgeLabel = T.wedge[w.key];
              if (useCurve) {
                return (
                  <text
                    key={`ilbl-${w.key}`}
                    
                    className={`wedge-label wedge-label-inner wedge-label-inner-size ${isIn ? "in" : ""}`}
                  >
                    <textPath href={`#tp-inner-${w.key}`} startOffset="50%" textAnchor="middle">
                      {wedgeLabel}
                    </textPath>
                  </text>
                );
              } else {
                // Straight label, positioned at wedge centre's polar coords at R_INNER_LABEL
                const p = polar(w.center, R_INNER_LABEL);
                return (
                  <text
                    key={`ilbl-${w.key}`}
                    x={p.x} y={p.y}
                    textAnchor="middle"
                    dominantBaseline="central"
                    className={`wedge-label wedge-label-inner wedge-label-inner-size ${isIn ? "in" : ""}`}
                  >
                    {wedgeLabel}
                  </text>
                );
              }
            })}

            {/* Outer ring labels — curved if vertical-friendly, straight if side */}
            {OUTER_WEDGES.map(w => {
              const sinAbs = Math.abs(Math.sin(deg2rad(w.center)));
              const useCurve = true;
              const isIn = outerIn.has(w.key);
              const wedgeLabel = T.wedge[w.key];
              if (useCurve) {
                return (
                  <text
                    key={`olbl-${w.key}`}
                    
                    className={`wedge-label wedge-label-outer wedge-label-outer-size ${isIn ? "in" : ""}`}
                  >
                    <textPath href={`#tp-outer-${w.key}`} startOffset="50%" textAnchor="middle">
                      {wedgeLabel}
                    </textPath>
                  </text>
                );
              } else {
                const p = polar(w.center, R_OUTER_LABEL);
                return (
                  <text
                    key={`olbl-${w.key}`}
                    x={p.x} y={p.y}
                    textAnchor="middle"
                    dominantBaseline="central"
                    className={`wedge-label wedge-label-outer wedge-label-outer-size ${isIn ? "in" : ""}`}
                  >
                    {wedgeLabel}
                  </text>
                );
              }
            })}

            {/* Centre pulse */}
            <circle
              cx={CX} cy={CY} r={R_CENTER + 8}
              fill="url(#centerGlow)"
              className={`center-pulse ${discIn ? "in" : ""}`}
            />

            {/* Centre disc */}
            <g className={`center-disc ${discIn ? "in" : ""}`}>
              <circle cx={CX} cy={CY} r={R_CENTER} fill="url(#centerGrad)" />
              <circle cx={CX} cy={CY} r={R_CENTER} fill="none"
                stroke="rgba(148,163,184,0.18)" strokeWidth="1" />
              {/* Hover interaction layer for the AI centre */}
              <circle cx={CX} cy={CY} r={R_CENTER}
                fill="transparent"
                style={{ cursor: "pointer", pointerEvents: "all" }}
                onMouseEnter={() => {
                  setHovered("ai-center");
                  triggerWink();
                  setBlinkKey(k => k + 1);
                }}
                onMouseLeave={() => setHovered(null)} />
            </g>
          </svg>

          {/* Pixie dust — three beats:
              1. Cluster of sparkles twinkle in sequence (~1500ms) — "something's brewing"
              2. Soft smoke cloud gathers (overlapping the sparkle tail)
              3. Face fades in from inside the cloud; last wisps drift up */}
          {dustOn ? (
            <div className="pixie-dust active">
              {/* --- Phase 1: sparkles (4 stars, twinkling in sequence) --- */}
              {[
                // Each sparkle stays at a fixed offset and just twinkles in place.
                //   x, y    = position offset from face spot
                //   size    = star size in px
                //   colour  = sparkle tint
                //   delay   = when this sparkle begins (sequenced)
                //   dur     = twinkle duration
                { x:  -8, y:  -6, size: 14, colour: "#D9A8FF", delay:   0, dur: 700 },
                { x:   6, y:   4, size: 12, colour: "#C484FF", delay: 320, dur: 700 },
                { x: -10, y:  10, size: 11, colour: "#FFE0B0", delay: 580, dur: 650 },
                { x:   8, y:  -8, size: 10, colour: "#D9A8FF", delay: 820, dur: 650 },
              ].map((s, i) => (
                <div
                  key={`spark-${i}`}
                  className="spark"
                  style={{
                    "--spark-x":      `${s.x}px`,
                    "--spark-y":      `${s.y}px`,
                    "--spark-colour": s.colour,
                    "--spark-delay":  `${s.delay}ms`,
                    "--spark-dur":    `${s.dur}ms`,
                  }}
                >
                  <div className="star" style={{ width: `${s.size}px`, height: `${s.size}px` }} />
                </div>
              ))}

              {/* --- Phase 2: smoke wisps (gather inward, hold, drift up) ---
                  Delay starts at ~1300ms to overlap the sparkle tail. */}
              {[
                { from: [-18,  10], mid: [-3,  2], to: [ -8, -22], size: 7, colour: "rgba(217,168,255,0.95)", delay: 1300, dur: 1500 },
                { from: [ 16, -14], mid: [ 2, -1], to: [  6, -28], size: 6, colour: "rgba(196,132,255,0.90)", delay: 1360, dur: 1450 },
                { from: [-14, -16], mid: [-2, -3], to: [ -4, -26], size: 8, colour: "rgba(217,168,255,0.85)", delay: 1420, dur: 1500 },
                { from: [ 20,   6], mid: [ 4,  1], to: [ 10, -20], size: 6, colour: "rgba(255,224,176,0.70)", delay: 1400, dur: 1400 },
                { from: [ -8,  18], mid: [-1,  3], to: [ -2, -24], size: 5, colour: "rgba(196,132,255,0.85)", delay: 1480, dur: 1500 },
                { from: [ 12,  16], mid: [ 1,  2], to: [  4, -22], size: 7, colour: "rgba(217,168,255,0.85)", delay: 1520, dur: 1450 },
                { from: [-20,  -4], mid: [-4, -1], to: [-10, -18], size: 5, colour: "rgba(255,224,176,0.65)", delay: 1560, dur: 1400 },
                { from: [  6, -20], mid: [ 1, -2], to: [  2, -28], size: 6, colour: "rgba(196,132,255,0.85)", delay: 1600, dur: 1500 },
              ].map((w, i) => {
                const fromTx = `translate(calc(-50% + ${w.from[0]}px), calc(-50% + ${w.from[1]}px)) scale(0.6)`;
                const midTx  = `translate(calc(-50% + ${w.mid[0]}px),  calc(-50% + ${w.mid[1]}px))  scale(1.0)`;
                const toTx   = `translate(calc(-50% + ${w.to[0]}px),   calc(-50% + ${w.to[1]}px))   scale(0.7)`;
                return (
                  <div
                    key={`wisp-${i}`}
                    className="wisp"
                    style={{
                      "--wisp-colour": w.colour,
                      "--wisp-from":   fromTx,
                      "--wisp-mid":    midTx,
                      "--wisp-to":     toTx,
                      "--wisp-delay":  `${w.delay}ms`,
                      "--wisp-dur":    `${w.dur}ms`,
                      width:           `${w.size}px`,
                      height:          `${w.size}px`,
                    }}
                  />
                );
              })}
            </div>
          ) : null}

          {/* AI Co-designer face — first appears perched to the left of the centred convo (faceIn),
              then migrates to the SVG centre once discIn is true. */}
          <div className={`center-text ${faceIn ? "in" : ""} ${discIn ? "centred" : ""}`}>
            <svg className={`codesigner-face ${hovered === "ai-center" ? "face-hover" : ""}`} width="56" height="32" viewBox="0 0 36 22" xmlns="http://www.w3.org/2000/svg">
              <ellipse className="face-glow" cx="18" cy="9" rx="14" ry="5" />
              <circle key={`l-${blinkKey}`} className="face-eye left"  cx="11" cy="9"  r="2.6" />
              <circle key={`r-${blinkKey}`} className={`face-eye right ${winkActive ? "winking" : ""}`} cx="25" cy="9"  r="2.6" />
              <path className="face-mouth" d="M 12 16 Q 18 19 24 16" />
            </svg>
          </div>
        </div>

        {/* Left column — wedge tooltip on hover, only revealed once the conversation has played */}
        <div className={`side-column left ${convoDone ? "ready" : ""}`}>
          <div className={`side-eyebrow ${tipText ? "" : "muted"}`}>
            {tipText ? tipText.eyebrow : T.sideExploreEyebrow}
          </div>
          <div className="side-rule" />
          <div className={`side-body ${tipText ? "" : "muted"}`}>
            {tipText ? tipText.body : T.sideExploreBody}
          </div>
        </div>

        {/* Right column shell — eyebrow + rule. Becomes visible once the conversation has settled into it. */}
        <div className={`side-column right ${convoSettled ? "ready" : ""}`}>
          <div className="side-eyebrow">{T.sideDesignEyebrow}</div>
          <div className="side-rule" />
          {/* Body slot is intentionally empty; the conversation itself lives in
              the floating wrapper below so it can slide in from centre. */}
          <div className="side-body convo-slot" />
        </div>

        {/* Floating conversation wrapper — sits centred while the user types,
            then slides into the right-column body slot once convoSettled is true. */}
        <div className={`convo-floater ${convoIn ? "ready" : ""} ${convoSettled ? "settled" : "centred"}`}>
          <Conversation active={convoIn} onWinkTrigger={triggerWink} onPhase={handleConvoPhase} T={T} />
        </div>
      </div>

      <div className="vignette"></div>
      <div className="grain"></div>

      <div className="timecode">{T.timecodePrefix} {tc}</div>

      <button
        className={`replay ${showReplay ? "show" : ""}`}
        onClick={() => setTick(t => t + 1)}
        tabIndex={showReplay ? 0 : -1}
      >
        {T.replay}
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
